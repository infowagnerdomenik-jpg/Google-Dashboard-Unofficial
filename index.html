<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Dashboard Unofficial</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#202124">
    <link rel="stylesheet" href="css/style.css">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
        }
    </script>
</head>
<body>
    <div class="header">
        <div class="logo"><img src="icons/google_logo.svg" alt="Google"></div>
    </div>
    <div class="launcher-container">
        <div class="grid">
            <a href="https://www.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_search.svg" alt="Suche"></div><div class="app-name">Suche</div></a>

            <a href="https://calendar.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_calendar.svg" alt="Kalender"></div><div class="app-name">Kalender</div></a>
            <a href="https://chat.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_chat.svg" alt="Chat"></div><div class="app-name">Chat</div></a>
            <a href="https://contacts.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_contacts.svg" alt="Kontakte"></div><div class="app-name">Kontakte</div></a>
            <a href="https://docs.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_docs.svg" alt="Docs"></div><div class="app-name">Docs</div></a>
            <a href="https://drive.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_drive.svg" alt="Drive"></div><div class="app-name">Drive</div></a>
            <a href="https://docs.google.com/forms" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_forms.svg" alt="Forms"></div><div class="app-name">Forms</div></a>
            <a href="https://gemini.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_gemini.svg" alt="Gemini"></div><div class="app-name">Gemini</div></a>
            <a href="https://mail.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_gmail.svg" alt="Gmail"></div><div class="app-name">Gmail</div></a>
            <a href="https://keep.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_keep.svg" alt="Notizen"></div><div class="app-name">Notizen</div></a>
            <a href="https://maps.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_maps.svg" alt="Maps"></div><div class="app-name">Maps</div></a>
            <a href="https://meet.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_meet.svg" alt="Meet"></div><div class="app-name">Meet</div></a>
            <a href="https://messages.google.com/web" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_messages.svg" alt="Messages"></div><div class="app-name">Messages</div></a>
            <a href="https://news.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_news.svg" alt="News"></div><div class="app-name">News</div></a>
            <a href="https://notebooklm.google.com" class="app-item" target="_blank"><div class="icon-wrapper icon-bg-white"><img src="icons/google_notebooklm.svg" alt="NotebookLM"></div><div class="app-name">NotebookLM</div></a>
            <a href="https://one.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_one.svg" alt="One"></div><div class="app-name">One</div></a>
            <a href="https://photos.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_photos.svg" alt="Fotos"></div><div class="app-name">Fotos</div></a>
            <a href="https://play.google.com/books" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_play_books.svg" alt="Play Books"></div><div class="app-name">Play Books</div></a>
            <a href="https://sheets.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_sheets.svg" alt="Tabellen"></div><div class="app-name">Tabellen</div></a>
            <a href="https://slides.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_slides.svg" alt="Slides"></div><div class="app-name">Slides</div></a>
            <a href="https://tasks.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_tasks.svg" alt="Tasks"></div><div class="app-name">Tasks</div></a>
            <a href="https://translate.google.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/google_translate.svg" alt="Übersetzer"></div><div class="app-name">Übersetzer</div></a>
            <a href="https://youtube.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/youtube.svg" alt="YouTube"></div><div class="app-name">YouTube</div></a>
            <a href="https://music.youtube.com" class="app-item" target="_blank"><div class="icon-wrapper"><img src="icons/youtube_music.svg" alt="YT Music"></div><div class="app-name">YT Music</div></a>
        </div>
    </div>
</body>
</html>
