<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Dashboard Unofficial</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1b1b1b">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <div class="logo"><img src="icons/google_logo.svg" alt="Google"></div>
    </div>
    
    <div class="launcher-container">
        <div class="grid" id="app-grid"></div>
    </div>

    <footer>
        <div class="footer-text">
            Google Dashboard Unofficial. <br>
            This project is not affiliated with, endorsed by, or sponsored by Google LLC.
        </div>
    </footer>

    <script src="js/apps.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
        }
    </script>
</body>
</html>
